name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:3001

  backend-smoke:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: API smoke (health + auth guard)
        run: npm run test:smoke
        env:
          # Intentional placeholders — smoke tests auth guards without a live Supabase project.
          JWT_SECRET: ci-jwt-secret-for-github-actions-smoke-tests
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-key

      - name: Full auth smoke (optional — add repository secrets)
        env:
          JWT_SECRET: ci-jwt-secret-for-github-actions-smoke-tests
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: |
          if [ -n "$SMOKE_ADMIN_EMAIL" ] && [ -n "$SMOKE_ADMIN_PASSWORD" ] && [ -n "$SUPABASE_URL" ]; then
            npm run test:smoke
          else
            echo "Skipping full auth smoke — set SMOKE_ADMIN_EMAIL, SMOKE_ADMIN_PASSWORD, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY in repo secrets"
          fi
